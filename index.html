// ============================================================
//  КОЛЛАБОРАТИВНЫЕ ПЛЕЙЛИСТЫ
// ============================================================
function CollaborativePlaylist({ playlistId }) {
  const { user, showToast } = useApp();
  const [playlist, setPlaylist] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [handle, setHandle] = useState('');
  const [inviteCode, setInviteCode] = useState('');

  useEffect(() => {
    const p = STORE.playlists().find(p => p.id === playlistId);
    setPlaylist(p || null);
  }, [playlistId]);

  if (!playlist) return null;

  const isOwner = user && playlist.userId === user.id;
  const collaborators = playlist.collaborators || [];

  const addCollaborator = () => {
    const h = handle.trim().toLowerCase();
    if (!h) return;
    const users = STORE.users();
    const target = users.find(u => u.handle === h);
    if (!target) { showToast('Пользователь не найден'); return; }
    if (target.id === playlist.userId) { showToast('Это владелец плейлиста'); return; }
    if (collaborators.some(c => c.id === target.id)) { showToast('Уже добавлен'); return; }

    const updated = {
      ...playlist,
      collaborators: [...collaborators, { id: target.id, name: target.name, handle: target.handle }]
    };
    STORE.setPlaylists(STORE.playlists().map(p => p.id === playlistId ? updated : p));
    setPlaylist(updated);
    setHandle('');
    setShowAdd(false);
    showToast('Соавтор добавлен');
  };

  const removeCollaborator = (id) => {
    const updated = {
      ...playlist,
      collaborators: collaborators.filter(c => c.id !== id)
    };
    STORE.setPlaylists(STORE.playlists().map(p => p.id === playlistId ? updated : p));
    setPlaylist(updated);
  };

  const generateInvite = () => {
    const code = Math.random().toString(36).substring(2, 10).toUpperCase();
    setInviteCode(code);
    // сохраним инвайт для активации позже
    const invites = LS.get('vh_invites', {});
    invites[code] = { playlistId, expires: Date.now() + 7*24*3600*1000 };
    LS.set('vh_invites', invites);
  };

  return (
    <div className="playlist-panel">
      <h3>👥 Соавторы плейлиста</h3>
      <div className="collaborators-list">
        {collaborators.length === 0 && (
          <span style={{ color: 'var(--text-muted)', fontSize: 13 }}>Пока никого нет</span>
        )}
        {collaborators.map(c => (
          <div key={c.id} className="collaborator-chip">
            <span>{c.name}</span>
            {isOwner && <button onClick={() => removeCollaborator(c.id)} title="Убрать">×</button>}
          </div>
        ))}
      </div>
      {isOwner && (
        <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
          <button className="btn-ghost" onClick={() => setShowAdd(true)}>
            <I d={ICONS.add} size={16} /> Добавить
          </button>
          <button className="btn-ghost" onClick={generateInvite}>
            🔗 Пригласить
          </button>
        </div>
      )}
      {inviteCode && (
        <div className="invite-code-box">
          <div className="label">Код приглашения (действует 7 дней)</div>
          <div className="code">{inviteCode}</div>
        </div>
      )}
      {showAdd && (
        <Modal title="Добавить соавтора" onClose={() => setShowAdd(false)}>
          <div className="field">
            <label className="field-label">Логин пользователя</label>
            <input
              className="field-input"
              placeholder="ivan_petrov"
              value={handle}
              onChange={(e) => setHandle(e.target.value.replace(/[^a-z0-9_]/gi, ''))}
              onKeyDown={(e) => e.key === 'Enter' && addCollaborator()}
              autoFocus
            />
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 16 }}>
            <button className="btn-ghost" onClick={() => setShowAdd(false)}>Отмена</button>
            <button className="btn-primary" onClick={addCollaborator}>Добавить</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ============================================================
//  ИИ-РЕКОМЕНДАЦИИ (эвристические)
// ============================================================
// ============================================================
//  ОЧЕРЕДЬ ПРОСМОТРА: плейлист (если есть) + AI-рекомендации
// ============================================================
function WatchQueue({ currentVideoId, playlistId }) {
  const { user, navigate } = useApp();

  // Плейлист, если задан
  const playlistData = useMemo(() => {
    if (!playlistId) return null;
    const playlist = STORE.playlists().find(p => p.id === playlistId);
    if (!playlist) return null;
    const items = STORE.playlistVideos()
      .filter(pv => pv.playlistId === playlistId)
      .sort((a, b) => (a.order || 0) - (b.order || 0))
      .map(pv => STORE.videos().find(v => v.id === pv.videoId))
      .filter(Boolean);
    const currentIndex = items.findIndex(v => v.id === currentVideoId);
    return { playlist, items, currentIndex };
  }, [playlistId, currentVideoId]);

  // Рекомендации (исключая текущее видео и всё, что уже в плейлисте)
  const recos = useMemo(() => {
    const exclude = new Set();
    if (playlistData) playlistData.items.forEach(v => exclude.add(v.id));
    return scoreRecommendations(currentVideoId, user, exclude).slice(0, 12);
  }, [currentVideoId, user, playlistData]);

  const goToPlaylist = () => navigate('playlist', { id: playlistId });

  const hasPlaylist = playlistData && playlistData.items.length > 0;

  return (
    <div className="watch-sidebar">
      {hasPlaylist && (
        <div className="queue-section">
          <div className="queue-header">
            <div style={{ minWidth: 0, flex: 1 }}>
              <div className="queue-header-title" style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                {playlistData.playlist.name}
              </div>
              <div className="queue-header-meta">
                {playlistData.currentIndex >= 0
                  ? `${playlistData.currentIndex + 1} / ${playlistData.items.length}`
                  : `${playlistData.items.length} видео`}
              </div>
            </div>
            <div className="queue-header-link" onClick={goToPlaylist}>Открыть</div>
          </div>
          <div>
            {playlistData.items.map(v => (
              <RecoItem
                key={v.id}
                video={v}
                playlistId={playlistId}
                active={v.id === currentVideoId}
              />
            ))}
          </div>
        </div>
      )}

      {recos.length > 0 ? (
        <>
          {hasPlaylist && <div className="queue-divider">Рекомендации</div>}
          {!hasPlaylist && (
            <h3>
              Рекомендации
              <span className="ai-badge">AI</span>
            </h3>
          )}
          <div>
            {recos.map(v => <RecoItem key={v.id} video={v} />)}
          </div>
        </>
      ) : (
        !hasPlaylist && (
          <>
            <h3>Рекомендации <span className="ai-badge">AI</span></h3>

// ============================================================
//  ЭКСПОРТ / ИМПОРТ
// ============================================================
function DataManagement({ onClose }) {
  const { showToast } = useApp();

  const exportMeta = () => {
    const data = {
      version: 2,
      exportDate: new Date().toISOString(),
      users:           STORE.users(),
      videos:          STORE.videos(),
      comments:        STORE.comments(),
      likes:           STORE.likes(),
      subscriptions:   STORE.subscriptions(),
      playlists:       STORE.playlists(),
      playlistVideos:  STORE.playlistVideos(),
      history:         STORE.history(),
      watchLater:      STORE.watchLater(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mytub_meta_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Метаданные экспортированы');
  };

  const importMeta = (event) => {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!confirm('Импортировать данные? Текущие метаданные будут заменены. Видеофайлы (blob) останутся.')) return;
        if (data.users)          STORE.setUsers(data.users);
        if (data.videos)         STORE.setVideos(data.videos);
        if (data.comments)       STORE.setComments(data.comments);
        if (data.likes)          STORE.setLikes(data.likes);
        if (data.subscriptions)  STORE.setSubscriptions(data.subscriptions);
        if (data.playlists)      STORE.setPlaylists(data.playlists);
        if (data.playlistVideos) STORE.setPlaylistVideos(data.playlistVideos);
        if (data.history)        STORE.setHistory(data.history);
        if (data.watchLater)     STORE.setWatchLater(data.watchLater);
        showToast('Импорт завершён. Перезагрузка…');
        setTimeout(() => window.location.reload(), 1200);
      } catch (err) {
        alert('Ошибка импорта: ' + err.message);
      }
    };
    reader.readAsText(file);
  };

  const clearAll = async () => {
    if (!confirm('Удалить ВСЕ данные сайта (видео, комментарии, аккаунты)? Это необратимо.')) return;
    if (!confirm('Точно? Все локальные данные будут стёрты.')) return;
    // localStorage
    Object.values(K).forEach(k => localStorage.removeItem(k));
    // IndexedDB
    try {
      const db = await openDB();
      const v = db.transaction('videos', 'readwrite').objectStore('videos');
      const t = db.transaction('thumbs', 'readwrite').objectStore('thumbs');
      v.clear(); t.clear();
    } catch {}
    setTimeout(() => window.location.reload(), 600);
  };

  return (
    <Modal title="💾 Управление данными" onClose={onClose}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <button className="data-row" onClick={exportMeta}>
          <I d={ICONS.upload} />
          <div>
            <div className="data-row-title">Экспорт метаданных</div>
            <div className="data-row-desc">JSON-файл со всеми списками (без блобов видео)</div>
          </div>
        </button>

        <label className="data-row" style={{ cursor: 'pointer' }}>
          <I d={ICONS.download} />
          <div>
            <div className="data-row-title">Импорт метаданных</div>
            <div className="data-row-desc">Загрузить ранее сохранённый JSON</div>
          </div>
          <input type="file" accept=".json" style={{ display: 'none' }} onChange={importMeta} />
        </label>

        <button className="data-row" onClick={clearAll} style={{ borderColor: 'var(--accent)' }}>
          <I d={ICONS.trash} />
          <div>
            <div className="data-row-title" style={{ color: 'var(--accent)' }}>Очистить всё</div>
            <div className="data-row-desc">Удалить локальные видео, комментарии и аккаунты</div>
          </div>
        </button>
      </div>
      <div className="info-box">
        ⚠️ Экспорт сохраняет только метаданные (заголовки, описания, лайки и т. п.).
        Сами видеофайлы лежат в IndexedDB и не переносятся через JSON.
      </div>
    </Modal>
  );
}

function useTheme() {
  const [theme, setTheme] = useState(() => LS.get(K.theme, 'dark'));
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    LS.set(K.theme, theme);
  }, [theme]);
  const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  return [theme, toggle];
}

function HomePage({ search }) {
  const [videos, setVideos] = useState([]);
  useEffect(() => {
    setVideos(STORE.videos().sort((a, b) => b.createdAt - a.createdAt));

  const filtered = useMemo(() => {
    if (!search.trim()) return videos;
    const q = search.toLowerCase();
    return videos.filter(v =>
      v.title.toLowerCase().includes(q) ||
      (v.description || '').toLowerCase().includes(q) ||
      (v.tags || []).some(t => t.toLowerCase().includes(q))
    );

  return (
    <div className="container">
      <div className="storage-note">

function TrendingPage() {
  const videos = useMemo(() => {
    const likesByVideo = STORE.likes().reduce((acc, l) => {
      acc[l.videoId] = (acc[l.videoId] || 0) + 1; return acc;
    }, {});
    return STORE.videos()
      .map(v => ({ ...v, _score: (v.views || 0) + (likesByVideo[v.id] || 0) * 50 }))
      .sort((a, b) => b._score - a._score)
      .slice(0, 30);

  return (

                  className="btn-ghost"
                  style={{ position: 'absolute', top: 8, left: 8, height: 28, padding: '0 10px', fontSize: 12 }}
                  onClick={(e) => {
                    e.stopPropagation();
                    if (!confirm('Убрать из плейлиста?')) return;
                    STORE.setPlaylistVideos(STORE.playlistVideos().filter(pv => !(pv.playlistId === playlistId && pv.videoId === v.id)));
                    force(x => x + 1);
                    showToast('Удалено из плейлиста');
                  }}
                >
                  Убрать
                </button>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AddToPlaylistMenu({ videoId, onClose }) {
  const { user, showToast } = useApp();
  const [name, setName] = useState('');
  const [creating, setCreating] = useState(false);
  const myPlaylists = STORE.playlists().filter(p =>
    p.userId === user.id || (p.collaborators || []).some(c => c.id === user.id)
  );

  const has = (pid) => STORE.playlistVideos().some(pv => pv.playlistId === pid && pv.videoId === videoId);

  const toggle = (pid) => {
    const all = STORE.playlistVideos();
    if (has(pid)) {
      STORE.setPlaylistVideos(all.filter(pv => !(pv.playlistId === pid && pv.videoId === videoId)));
      showToast('Удалено из плейлиста');
    } else {
      const order = all.filter(pv => pv.playlistId === pid).length;
      STORE.setPlaylistVideos([...all, { playlistId: pid, videoId, addedAt: Date.now(), order }]);
      showToast('Добавлено в плейлист');
    }
    onClose();
  };

  const createAndAdd = () => {
    if (!name.trim()) return;
    const p = {
      id: uid(),
      name: name.trim(),
      userId: user.id,
      collaborators: [],
      createdAt: Date.now(),
    };
    STORE.setPlaylists([p, ...STORE.playlists()]);
    STORE.setPlaylistVideos([...STORE.playlistVideos(), { playlistId: p.id, videoId, addedAt: Date.now(), order: 0 }]);
    showToast('Плейлист создан, видео добавлено');
    onClose();
  };

  return (
    <Modal title="Сохранить в плейлист" onClose={onClose}>
      {myPlaylists.length > 0 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginBottom: 16 }}>
          {myPlaylists.map(p => (
            <label key={p.id} className="user-menu-item" style={{ borderRadius: 6 }}>
              <input
                type="checkbox"
                checked={has(p.id)}
                onChange={() => toggle(p.id)}
                style={{ width: 18, height: 18, cursor: 'pointer' }}
              />
              <span style={{ flex: 1 }}>{p.name}</span>
            </label>
          ))}
        </div>
      )}
      {creating ? (
        <div className="field">
          <label className="field-label">Название нового плейлиста</label>
          <input
            className="field-input"
            value={name}
            onChange={(e) => setName(e.target.value)}
            maxLength={100}
            autoFocus
            onKeyDown={(e) => e.key === 'Enter' && createAndAdd()}
          />
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 12 }}>
            <button className="btn-ghost" onClick={() => setCreating(false)}>Назад</button>
            <button className="btn-primary" onClick={createAndAdd} disabled={!name.trim()}>Создать</button>
          </div>
        </div>
      ) : (
        <button className="btn-ghost" onClick={() => setCreating(true)} style={{ width: '100%' }}>
          <I d={ICONS.add} size={16} /> Создать новый плейлист
        </button>
      )}
    </Modal>
  );
}

function WatchPage({ videoId, playlistId }) {
  const { user, navigate, showToast } = useApp();
  const [video, setVideo] = useState(null);
  const [videoUrl, setVideoUrl] = useState(null);
  const [thumbUrl, setThumbUrl] = useState(null);
  const [author, setAuthor] = useState(null);
  const [descExpanded, setDescExpanded] = useState(false);
  const [liked, setLiked] = useState(false);
  const [likeCount, setLikeCount] = useState(0);
  const [comments, setComments] = useState([]);
  const [commentText, setCommentText] = useState('');
  const [subscribed, setSubscribed] = useState(false);
  const [subCount, setSubCount] = useState(0);
  const [showAddPL, setShowAddPL] = useState(false);

  useEffect(() => {
    const v = STORE.videos().find(x => x.id === videoId);
    if (!v) return;
    setVideo(v);
    const auth = STORE.users().find(u => u.id === v.authorId);
    setAuthor(auth);

    // Просмотр (раз в сессию)
    const sessionKey = `viewed_${videoId}`;
    if (!sessionStorage.getItem(sessionKey)) {
      sessionStorage.setItem(sessionKey, '1');
      const all = STORE.videos();
      const idx = all.findIndex(x => x.id === videoId);
      if (idx >= 0) {
        all[idx].views = (all[idx].views || 0) + 1;
        STORE.setVideos(all);
        setVideo(all[idx]);
      }
    }

    // История
    if (user) {
      const hist = STORE.history().filter(h => !(h.userId === user.id && h.videoId === videoId));
      hist.unshift({ userId: user.id, videoId, ts: Date.now() });
      STORE.setHistory(hist.slice(0, 200));
    }

    getBlobUrl('videos', v.videoKey).then(setVideoUrl);
    if (v.thumbKey) getBlobUrl('thumbs', v.thumbKey).then(setThumbUrl);

    // Лайки
    const allLikes = STORE.likes();
    setLikeCount(allLikes.filter(l => l.videoId === videoId).length);
    if (user) setLiked(allLikes.some(l => l.videoId === videoId && l.userId === user.id));

    // Подписки
    const allSubs = STORE.subscriptions();
    setSubCount(allSubs.filter(s => s.channelId === v.authorId).length);
    if (user) setSubscribed(allSubs.some(s => s.userId === user.id && s.channelId === v.authorId));

    // Комментарии
    setComments(STORE.comments().filter(c => c.videoId === videoId).sort((a, b) => b.createdAt - a.createdAt));

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [videoId, user]);

  // ====================================================
  //  Очередь воспроизведения: плейлист → рекомендации
  // ====================================================
  const queue = useMemo(() => {
    // Сначала пытаемся продолжить плейлист
    let playlistNext = null;
    let stayInPlaylist = false;
    let playlistRemainingIds = new Set();

    if (playlistId) {
      const items = STORE.playlistVideos()
        .filter(pv => pv.playlistId === playlistId)
        .sort((a, b) => (a.order || 0) - (b.order || 0))
        .map(pv => STORE.videos().find(v => v.id === pv.videoId))
        .filter(Boolean);
      const idx = items.findIndex(v => v.id === videoId);
      if (idx >= 0 && idx < items.length - 1) {
        playlistNext = items[idx + 1];
        stayInPlaylist = true;
        // оставшаяся часть плейлиста после текущего
        items.slice(idx + 1).forEach(v => playlistRemainingIds.add(v.id));
      }
    }

    // Если в плейлисте есть следующее — играем его
    if (playlistNext) {
      return { nextVideo: playlistNext, nextInPlaylist: stayInPlaylist };
    }

    // Иначе берём топ-рекомендацию (исключая весь плейлист, если он был)
    const exclude = new Set();
    if (playlistId) {
      STORE.playlistVideos()
        .filter(pv => pv.playlistId === playlistId)
        .forEach(pv => exclude.add(pv.videoId));
    }
    const recs = scoreRecommendations(videoId, user, exclude);
    return { nextVideo: recs[0] || null, nextInPlaylist: false };
  }, [videoId, playlistId, user]);

  const nextVideo = queue.nextVideo;

  const goNext = () => {
    if (!nextVideo) return;
    navigate('watch', {
      id: nextVideo.id,
      // оставляем playlistId только если следующее видео всё ещё внутри плейлиста
      pl: queue.nextInPlaylist ? playlistId : undefined
    });
  };

  const toggleLike = () => {
    if (!user) { navigate('login'); return; }
    const all = STORE.likes();
    if (liked) {
      STORE.setLikes(all.filter(l => !(l.videoId === videoId && l.userId === user.id)));
      setLiked(false);
      setLikeCount(c => c - 1);
    } else {
      STORE.setLikes([...all, { videoId, userId: user.id, ts: Date.now() }]);
      setLiked(true);
      setLikeCount(c => c + 1);
    }
  };

  const toggleSubscribe = () => {
    if (!user) { navigate('login'); return; }
    if (!video) return;
    const all = STORE.subscriptions();
    if (subscribed) {
      STORE.setSubscriptions(all.filter(s => !(s.userId === user.id && s.channelId === video.authorId)));
      setSubscribed(false);
      setSubCount(c => Math.max(0, c - 1));
      showToast('Вы отписались');
    } else {
      STORE.setSubscriptions([...all, { userId: user.id, channelId: video.authorId, ts: Date.now() }]);
      setSubscribed(true);
      setSubCount(c => c + 1);
      showToast('Вы подписались');
    }
  };

  const addComment = () => {
    if (!user || !commentText.trim()) return;
    const c = {
      id: uid(),
      videoId,
      authorId: user.id,
      text: commentText.trim(),
      createdAt: Date.now()
    };
    STORE.setComments([c, ...STORE.comments()]);
    setComments([c, ...comments]);
    setCommentText('');
  };

  const deleteComment = (id) => {
    STORE.setComments(STORE.comments().filter(c => c.id !== id));
    setComments(comments.filter(c => c.id !== id));
  };

  const shareVideo = () => {
    const url = `${window.location.origin}${window.location.pathname}#/watch/${videoId}`;
    navigator.clipboard?.writeText(url).then(() => showToast('Ссылка скопирована')).catch(() => {});
  };

  if (!video) {
    return <div className="container"><div className="empty-state"><h2>Видео не найдено</h2></div></div>;
  }

  return (
    <div className="watch-layout">
      <div className="watch-primary">
        {videoUrl ? (
          <VideoPlayer
            src={videoUrl}
            poster={thumbUrl}
            title={video.title}
            onNext={nextVideo ? goNext : undefined}
            hasNext={!!nextVideo}
          />
        ) : (
          <div className="vp" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div>Загрузка…</div>
          </div>
        )}

        <h1 className="watch-title">{video.title}</h1>

        <div className="watch-meta-row">
          <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
            <div className="watch-author" onClick={() => author && navigate('profile', { id: author.id })} style={{ cursor: 'pointer' }}>
              <Avatar user={author} />
              <div className="watch-author-info">
                <div className="watch-author-name">{author?.name || 'Удалённый'}</div>
                <div className="watch-author-meta">{formatNumber(subCount)} подписч.</div>
              </div>
            </div>
            {user?.id !== video.authorId && (
              <button
                className={`subscribe-btn ${subscribed ? 'subscribed' : ''}`}
                onClick={toggleSubscribe}
              >
                {subscribed ? 'Вы подписаны' : 'Подписаться'}
              </button>
            )}
            {author && user?.id !== video.authorId && (
              <DonateButton channelId={author.id} channelName={author.name} />
            )}
          </div>
          <div className="watch-actions">
            <button className={`action-btn ${liked ? 'active' : ''}`} onClick={toggleLike}>
              <I d={ICONS.like} />
              <span>{likeCount}</span>
            </button>
            <button className="action-btn" onClick={shareVideo}>
              <I d={ICONS.share} /> <span>Поделиться</span>
            </button>
            {user && (
              <button className="action-btn" onClick={() => setShowAddPL(true)}>
                <I d={ICONS.playlist} /> <span>Сохранить</span>
              </button>
            )}
          </div>
        </div>

        <div className={`watch-description ${descExpanded ? 'expanded' : ''}`} onClick={() => setDescExpanded(!descExpanded)}>
          <div className="watch-description-meta">
            {formatViews(video.views || 0)} · {formatTimeAgo(video.createdAt)}
          </div>
          <div className="watch-description-text">
            {video.description || 'Без описания'}
          </div>
          {video.tags && video.tags.length > 0 && (
            <div className="watch-tags">
              {video.tags.map(t => <span key={t} className="watch-tag">#{t}</span>)}
            </div>
          )}
          {(video.description?.length > 200 || (video.tags || []).length > 0) && (
            <div className="watch-description-toggle">
              {descExpanded ? 'Свернуть' : 'Развернуть'}
            </div>
          )}
        </div>

        <div className="comments-section">
          <div className="comments-header">{comments.length} комментариев</div>
          {user ? (
            <div className="comment-form">
              <Avatar user={user} />
              <div className="comment-form-content">
                <textarea
                  className="comment-input"
                  placeholder="Оставьте комментарий…"
                  value={commentText}
                  onChange={(e) => setCommentText(e.target.value)}
                  rows="1"
                  onInput={(e) => {
                    e.target.style.height = 'auto';
                    e.target.style.height = e.target.scrollHeight + 'px';
                  }}
                />
                {commentText.trim() && (
                  <div className="comment-form-actions">
                    <button className="btn-ghost" onClick={() => setCommentText('')}>Отмена</button>
                    <button className="btn-primary" onClick={addComment}>Отправить</button>
                  </div>
                )}
              </div>
            </div>
          ) : (
            <div style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 24 }}>
              <a onClick={() => navigate('login')} style={{ color: 'var(--accent-blue)', cursor: 'pointer' }}>Войдите</a>, чтобы оставить комментарий.
            </div>
          )}
          {comments.map(c => {
            const cAuthor = STORE.users().find(u => u.id === c.authorId);
            return (
              <div className="comment" key={c.id}>
                <Avatar user={cAuthor} />
                <div className="comment-content">
                  <div className="comment-header">
                    <span className="comment-author">{cAuthor?.name || 'Удалённый'}</span>
                    <span className="comment-time">{formatTimeAgo(c.createdAt)}</span>
                  </div>
                  <div className="comment-text">{c.text}</div>
                  {user?.id === c.authorId && (
                    <button className="comment-delete" onClick={() => deleteComment(c.id)}>Удалить</button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <WatchQueue currentVideoId={videoId} playlistId={playlistId} />

      {showAddPL && <AddToPlaylistMenu videoId={videoId} onClose={() => setShowAddPL(false)} />}
    </div>
  );
}

function UploadPage() {
  const { user, navigate } = useApp();
  const [file, setFile] = useState(null);
  const [thumb, setThumb] = useState(null);
  const [thumbUrl, setThumbUrl] = useState(null);
  const [duration, setDuration] = useState(0);
  const [title, setTitle] = useState('');
  const [description, setDescription] = useState('');
  const [tags, setTags] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [progress, setProgress] = useState(0);
  const [dragging, setDragging] = useState(false);

  if (!user) {
    return (
      <div className="upload-page">
        <div className="empty-state">
          <h2>Нужно войти в аккаунт</h2>
          <p style={{ marginBottom: 16 }}>Чтобы загружать видео, войдите или зарегистрируйтесь.</p>
          <button className="btn-primary" onClick={() => navigate('login')}>Войти</button>
        </div>
      </div>
    );
  }

  const handleFile = async (f) => {
    setError('');
    if (!f) return;
    if (!f.type.startsWith('video/')) { setError('Это не видеофайл.'); return; }
    if (f.size > 2 * 1024 * 1024 * 1024) { setError('Файл слишком большой (макс. 2 ГБ).'); return; }
    setFile(f);
    setTitle(f.name.replace(/\.[^.]+$/, ''));
    try {
      const { thumb: t, duration: d } = await generateThumbnail(f);
      setThumb(t);
      setThumbUrl(URL.createObjectURL(t));
      setDuration(d);
    } catch (e) {
      setError('Не удалось прочитать видео: ' + e.message);
    }
  };

  const onSubmit = async () => {
    if (!file || !title.trim()) { setError('Укажите название.'); return; }
    setBusy(true);
    setError('');
    setProgress(0);
    try {
      const videoKey = uid();
      const thumbKey = thumb ? uid() : null;
      setProgress(20);
      await dbPut('videos', videoKey, file);
      setProgress(70);
      if (thumb) await dbPut('thumbs', thumbKey, thumb);
      setProgress(90);
      const tagList = tags.split(',').map(t => t.trim().replace(/^#/, '')).filter(Boolean);
      const meta = {
        id: uid(),
        title: title.trim(),
        description: description.trim(),
        tags: tagList,
        authorId: user.id,
        videoKey,
        thumbKey,
        duration,
        size: file.size,
        createdAt: Date.now(),
        views: 0
      };
      STORE.setVideos([meta, ...STORE.videos()]);
      setProgress(100);
      setTimeout(() => navigate('watch', { id: meta.id }), 300);
    } catch (e) {
      setError('Ошибка при сохранении: ' + (e.message || e.name));
      setBusy(false);
    }
  };

  return (
    <div className="upload-page">
      <h1 className="page-title">Загрузить видео</h1>
      {!file ? (
        <div
          className={`upload-drop ${dragging ? 'dragging' : ''}`}
          onClick={() => document.getElementById('upload-input').click()}
          onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={(e) => {
            e.preventDefault();
            setDragging(false);
            const f = e.dataTransfer.files[0];
            if (f) handleFile(f);
          }}
        >
          <div className="upload-drop-icon"><I d={ICONS.uploadCloud} /></div>
          <h2>Перетащите видео сюда</h2>
          <p>или нажмите, чтобы выбрать файл (MP4, WebM, MOV — до 2 ГБ)</p>
          <button className="btn-primary">Выбрать файл</button>
          <input
            id="upload-input"
            type="file"
            accept="video/*"
            style={{ display: 'none' }}
            onChange={(e) => handleFile(e.target.files[0])}
          />
        </div>
      ) : (
        <div>
          <div className="upload-form">
            <div className="upload-form-fields">
              <div className="field">
                <label className="field-label">Название (обязательно)</label>
                <input
                  className="field-input"
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                  maxLength="100"
                />
                <div className="field-hint">{title.length} / 100</div>
              </div>
              <div className="field">
                <label className="field-label">Описание</label>
                <textarea
                  className="field-textarea"
                  value={description}
                  onChange={(e) => setDescription(e.target.value)}
                  maxLength="2000"
                  placeholder="Расскажите о видео…"
                />
                <div className="field-hint">{description.length} / 2000</div>
              </div>
              <div className="field">
                <label className="field-label">Теги (через запятую)</label>
                <input
                  className="field-input"
                  value={tags}
                  onChange={(e) => setTags(e.target.value)}
                  placeholder="музыка, клип, 2024"
                />
              </div>
            </div>
            <div className="upload-form-preview">
              <div className="upload-thumb" style={thumbUrl ? { backgroundImage: `url(${thumbUrl})` } : {}} />
              <div className="upload-thumb-info">
                <div><strong>Файл:</strong> {file.name}</div>
                <div><strong>Размер:</strong> {(file.size / 1024 / 1024).toFixed(1)} МБ</div>
                <div><strong>Длительность:</strong> {formatDuration(duration)}</div>
              </div>
            </div>
          </div>

          {error && <div className="login-error" style={{ marginTop: 16 }}>{error}</div>}
          {busy && (
            <div style={{ marginTop: 16 }}>
              <div className="field-hint">Сохраняем… {progress}%</div>
              <div className="progress-bar"><div className="progress-bar-fill" style={{ width: `${progress}%` }} /></div>
            </div>
          )}

          <div className="upload-actions">
            <button className="btn-ghost" disabled={busy} onClick={() => { setFile(null); setThumb(null); setThumbUrl(null); }}>
              Отменить
            </button>
            <button className="btn-primary" disabled={busy || !title.trim()} onClick={onSubmit}>
              {busy ? 'Сохранение…' : 'Опубликовать'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProfilePage({ userId }) {
  const { user, navigate, showToast } = useApp();
  const [tick, setTick] = useState(0);
  const targetUser = useMemo(() => STORE.users().find(u => u.id === userId), [userId]);
  const videos = useMemo(
    () => STORE.videos().filter(v => v.authorId === userId).sort((a,b) => b.createdAt - a.createdAt),
    [userId, tick]
  );
  const totalViews = videos.reduce((s, v) => s + (v.views || 0), 0);
  const subCount = useMemo(() => STORE.subscriptions().filter(s => s.channelId === userId).length, [userId, tick]);
  const [subscribed, setSubscribed] = useState(false);
  const [showDataMgmt, setShowDataMgmt] = useState(false);

  const isOwn = user?.id === userId;

  useEffect(() => {
    if (user) setSubscribed(STORE.subscriptions().some(s => s.userId === user.id && s.channelId === userId));
  }, [user, userId]);

  const toggleSub = () => {
    if (!user) { navigate('login'); return; }
    const all = STORE.subscriptions();
    if (subscribed) {
      STORE.setSubscriptions(all.filter(s => !(s.userId === user.id && s.channelId === userId)));
      setSubscribed(false);
      showToast('Вы отписались');
    } else {
      STORE.setSubscriptions([...all, { userId: user.id, channelId: userId, ts: Date.now() }]);
      setSubscribed(true);
      showToast('Вы подписались');
    }
  };

  if (!targetUser) {
    return <div className="container"><div className="empty-state"><h2>Пользователь не найден</h2></div></div>;
  }

  return (
    <div className="container">
      <div className="profile-header">
        <Avatar user={targetUser} size="xl" />
        <div className="profile-info">
          <h1>{targetUser.name}</h1>
          <p>
            @{targetUser.handle} · {formatNumber(subCount)} подписч. · {videos.length} видео · {formatViews(totalViews)}

        </div>
        <div className="profile-actions">
          {isOwn ? (
            <>
              <button className="upload-btn" onClick={() => navigate('upload')}>
                <I d={ICONS.upload} /> <span>Загрузить</span>
              </button>
              <button className="icon-btn" onClick={() => setShowDataMgmt(true)} title="Управление данными">
                <I d={ICONS.download} />
              </button>
            </>
          ) : (
            <>
              <button className={`subscribe-btn ${subscribed ? 'subscribed' : ''}`} onClick={toggleSub}>
                {subscribed ? 'Вы подписаны' : 'Подписаться'}
              </button>
              <DonateButton channelId={userId} channelName={targetUser.name} />
            </>
          )}
        </div>
      </div>

      <h2 className="page-title" style={{ fontSize: 16 }}>Видео</h2>
      {videos.length === 0 ? (
        <div className="empty-state">
          <p>Пока ничего не загружено.</p>
          {isOwn && (
            <button className="btn-primary" style={{ marginTop: 12 }} onClick={() => navigate('upload')}>
              <I d={ICONS.upload} /> Загрузить первое видео
            </button>
          )}
        </div>
      ) : (
        <div className="video-grid">
          {videos.map(v => (
            <VideoCard
              key={v.id}
              video={v}
              canDelete={isOwn}
              onDeleted={() => setTick(t => t + 1)}
            />
          ))}
        </div>
      )}
      {showDataMgmt && <DataManagement onClose={() => setShowDataMgmt(false)} />}
    </div>
  );
}

// ============================================================
//  LOGIN PAGE
// ============================================================
function LoginPage({ onLogin }) {
  const { navigate } = useApp();
  const [mode, setMode] = useState('login');
  const [name, setName] = useState('');
  const [handle, setHandle] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setError('');
    if (!handle.trim() || !password) { setError('Заполните все поля.'); return; }
    setBusy(true);
    try {
      const users = STORE.users();
      if (mode === 'register') {
        if (!name.trim()) { setError('Укажите имя.'); setBusy(false); return; }
        if (handle.length < 3) { setError('Логин слишком короткий.'); setBusy(false); return; }
        if (users.find(u => u.handle === handle.toLowerCase())) {
          setError('Логин уже занят.');
          setBusy(false);
          return;
        }
        const newUser = {
          id: uid(),
          name: name.trim(),
          handle: handle.toLowerCase(),
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          passwordHash: await hashPassword(password),
          createdAt: Date.now()
        };
        STORE.setUsers([...users, newUser]);
        STORE.setCurrentUserId(newUser.id);
        onLogin(newUser);
      } else {
        const u = users.find(x => x.handle === handle.toLowerCase());
        if (!u) { setError('Пользователь не найден.'); setBusy(false); return; }
        const h = await hashPassword(password);
        if (u.passwordHash !== h) { setError('Неверный пароль.'); setBusy(false); return; }
        STORE.setCurrentUserId(u.id);
        onLogin(u);
      }
    } catch (e) {
      setError(e.message);
      setBusy(false);
    }
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <h1>{mode === 'login' ? 'Вход' : 'Регистрация'}</h1>
        <div className="login-tabs">
          <button className={`login-tab ${mode === 'login' ? 'active' : ''}`} onClick={() => { setMode('login'); setError(''); }}>Войти</button>
          <button className={`login-tab ${mode === 'register' ? 'active' : ''}`} onClick={() => { setMode('register'); setError(''); }}>Регистрация</button>
        </div>
        {error && <div className="login-error">{error}</div>}
        {mode === 'register' && (
          <div className="field">
            <label className="field-label">Имя для отображения</label>
            <input className="field-input" value={name} onChange={(e) => setName(e.target.value)} placeholder="Иван Петров" />
          </div>
        )}
        <div className="field">
          <label className="field-label">Логин</label>
          <input
            className="field-input"
            value={handle}
            onChange={(e) => setHandle(e.target.value.replace(/[^a-z0-9_]/gi, ''))}
            placeholder="ivan_petrov"
            autoCapitalize="off"
          />
        </div>
        <div className="field">
          <label className="field-label">Пароль</label>
          <input
            className="field-input"
            type="password"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && submit()}
          />
        </div>
        <button className="login-submit" disabled={busy} onClick={submit}>
          {busy ? 'Подождите…' : (mode === 'login' ? 'Войти' : 'Создать аккаунт')}
        </button>
        <p style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 16, textAlign: 'center', lineHeight: 1.5 }}>
          Это локальная демонстрация. Пароль хранится в вашем браузере хэшем SHA-256.<br/>
          Не используйте здесь реальные пароли от других сервисов.
        </p>
      </div>
    </div>
  );
}

// ============================================================
//  РОУТИНГ
// ============================================================
function parseHash() {
  const fullHash = window.location.hash.slice(1) || '/';
  const [path, queryStr = ''] = fullHash.split('?');
  const query = {};
  for (const pair of queryStr.split('&').filter(Boolean)) {
    const [k, v = ''] = pair.split('=');
    if (k) query[decodeURIComponent(k)] = decodeURIComponent(v);
  }

  if (path === '/' || path === '') return { page: 'home', params: { ...query } };
  const watchMatch = path.match(/^\/watch\/(.+)$/);
  if (watchMatch) return { page: 'watch', params: { id: watchMatch[1], ...query } };
  if (path === '/upload') return { page: 'upload', params: { ...query } };
  const profMatch = path.match(/^\/profile\/(.+)$/);
  if (profMatch) return { page: 'profile', params: { id: profMatch[1], ...query } };
  const plMatch = path.match(/^\/playlist\/(.+)$/);
  if (plMatch) return { page: 'playlist', params: { id: plMatch[1], ...query } };
  if (path === '/login') return { page: 'login', params: { ...query } };
  if (path === '/history') return { page: 'history', params: { ...query } };
  if (path === '/subscriptions') return { page: 'subscriptions', params: { ...query } };
  if (path === '/library') return { page: 'library', params: { ...query } };
  if (path === '/watchlater') return { page: 'watchlater', params: { ...query } };
  if (path === '/liked') return { page: 'liked', params: { ...query } };
  if (path === '/trending') return { page: 'trending', params: { ...query } };
  return { page: 'home', params: { ...query } };
}

function navigateHash(page, params = {}) {
  let h = '/';
  if (page === 'watch') h = `/watch/${params.id}`;
  else if (page === 'profile') h = `/profile/${params.id}`;
  else if (page === 'playlist') h = `/playlist/${params.id}`;
  else if (page === 'upload') h = '/upload';
  else if (page === 'login') h = '/login';
  else if (page === 'history') h = '/history';
  else if (page === 'subscriptions') h = '/subscriptions';
  else if (page === 'library') h = '/library';
  else if (page === 'watchlater') h = '/watchlater';
  else if (page === 'liked') h = '/liked';
  else if (page === 'trending') h = '/trending';

  // Сериализуем дополнительные параметры в query string (всё, кроме `id`)
  const q = [];
  for (const [k, v] of Object.entries(params)) {
    if (k === 'id' || v == null || v === '') continue;
    q.push(`${encodeURIComponent(k)}=${encodeURIComponent(v)}`);
  }
  if (q.length) h += '?' + q.join('&');
  window.location.hash = h;
}

// ============================================================
//  APP
// ============================================================
function App() {
  const [route, setRoute] = useState(parseHash());
  const [user, setUser] = useState(null);
  const [search, setSearch] = useState('');
  const [toast, setToast] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 1024);
  const [theme, toggleTheme] = useTheme();

  useEffect(() => {
    const id = STORE.currentUserId();
    if (id) {
      const u = STORE.users().find(x => x.id === id);
      if (u) {
        // на старых аккаунтах не было цвета — добавим
        if (!u.color) {
          u.color = colorFor(u.id);
          STORE.setUsers(STORE.users().map(x => x.id === u.id ? u : x));
        }
        setUser(u);
      }
    }
    const onHashChange = () => {
      setRoute(parseHash());
      // на мобильных закрываем сайдбар при переходе
      if (window.innerWidth <= 1024) setSidebarOpen(false);
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  const navigate = (page, params) => {
    navigateHash(page, params);
  };

  const onLogout = () => {
    STORE.setCurrentUserId(null);
    setUser(null);
    navigate('home');
  };

  const showToast = (msg) => {
    setToast(msg);
  };

  const ctx = { user, navigate, showToast, onLogout, theme, toggleTheme };

  return (
    <AppContext.Provider value={ctx}>
      <Header
        onToggleSidebar={() => setSidebarOpen(o => !o)}
        search={search}
        setSearch={setSearch}
        theme={theme}
        toggleTheme={toggleTheme}
      />
      <div style={{ display: 'flex' }}>
        <Sidebar open={sidebarOpen} currentPage={route.page} />
        <main className="main-content">
          {route.page === 'home' && <HomePage search={search} />}
          {route.page === 'watch' && <WatchPage videoId={route.params.id} playlistId={route.params.pl} />}
          {route.page === 'upload' && <UploadPage />}
          {route.page === 'profile' && <ProfilePage userId={route.params.id} />}
          {route.page === 'playlist' && <PlaylistPage playlistId={route.params.id} />}
          {route.page === 'login' && <LoginPage onLogin={(u) => { setUser(u); navigate('home'); }} />}
          {route.page === 'history' && <HistoryPage />}
          {route.page === 'subscriptions' && <SubscriptionsPage />}
          {route.page === 'library' && <LibraryPage />}
          {route.page === 'watchlater' && <WatchLaterPage />}
          {route.page === 'liked' && <LikedPage />}
          {route.page === 'trending' && <TrendingPage />}
        </main>
      </div>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
