<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МойТуб Pro — Локальный видеохостинг</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<script>
  Babel.registerPreset('rc', { presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]] });
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.2s, color 0.2s;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }

  /* ===== ТЕМЫ ===== */
  :root, [data-theme="dark"] {
    --accent: #FF0033;
    --accent-blue: #3ea6ff;
    --bg: #0f0f0f;
    --bg-2: #1a1a1a;
    --bg-3: #222;
    --bg-hover: #2e2e2e;
    --text: #fff;
    --text-muted: #aaa;
    --text-dim: #717171;
    --border: #2a2a2a;
    --shadow: 0 4px 16px rgba(0,0,0,0.4);
    --menu-bg: #282828;
    --menu-hover: #3a3a3a;
  }

  [data-theme="light"] {
    --accent: #FF0033;
    --accent-blue: #065fd4;
    --bg: #ffffff;
    --bg-2: #f2f2f2;
    --bg-3: #e5e5e5;
    --bg-hover: #d6d6d6;
    --text: #0f0f0f;
    --text-muted: #606060;
    --text-dim: #909090;
    --border: #dadada;
    --shadow: 0 4px 16px rgba(0,0,0,0.1);
    --menu-bg: #ffffff;
    --menu-hover: #f0f0f0;
  }

  [data-theme="light"] .logo-mark svg path { fill: white; }
  [data-theme="light"] .icon-btn svg { fill: currentColor; }
  [data-theme="light"] .search-btn svg path { fill: var(--text); }

  /* ===========  HEADER  =========== */
  .header {
    position: sticky; top: 0; z-index: 100;
    height: 56px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 20px;
    gap: 12px;
  }
  .logo {
    font-size: 20px; font-weight: 700;
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .logo-mark {
    width: 28px; height: 20px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 12px; height: 12px; fill: white; margin-left: 1px; }

  .search-wrap {
    flex: 1; max-width: 600px;
    margin: 0 auto;
    display: flex;
    position: relative;
  }
  .search-input {
    flex: 1;
    height: 38px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 20px 0 0 20px;
    padding: 0 16px;
    color: var(--text);
    outline: none;
    font-size: 14px;
  }
  .search-input:focus { border-color: var(--accent-blue); box-shadow: inset 0 0 0 1px var(--accent-blue); }
  .search-btn {
    width: 58px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 0 20px 20px 0;
    cursor: pointer;
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
  }
  .search-btn:hover { background: var(--bg-hover); }
  .search-btn svg { width: 20px; height: 20px; fill: var(--text); }

  .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .icon-btn {
    width: 40px; height: 40px;
    background: none; border: none;
    border-radius: 50%;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .icon-btn:hover { background: var(--bg-3); }
  .icon-btn svg { width: 22px; height: 22px; fill: var(--text); }

  .notifications-badge {
    position: absolute; top: 4px; right: 4px;
    min-width: 16px; height: 16px;
    background: var(--accent);
    border-radius: 8px;
    padding: 0 4px;
    font-size: 10px; font-weight: 600;
    color: white;
    display: flex; align-items: center; justify-content: center;
  }

  .upload-btn, .create-btn {
    height: 36px;
    padding: 0 14px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 18px;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 500;
  }
  .upload-btn:hover, .create-btn:hover { background: var(--bg-hover); }
  .upload-btn svg, .create-btn svg { width: 18px; height: 18px; fill: var(--text); }

  .login-btn {
    height: 36px;
    padding: 0 16px;
    background: transparent;
    border: 1px solid var(--accent-blue);
    border-radius: 18px;
    color: var(--accent-blue);
    cursor: pointer;
    font-size: 14px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .login-btn:hover { background: rgba(62, 166, 255, 0.1); }
  .login-btn svg { fill: var(--accent-blue); }

  /* === Аватар === */
  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    font-size: 14px;
    color: white;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .avatar.sm { width: 28px; height: 28px; font-size: 12px; }
  .avatar.lg { width: 56px; height: 56px; font-size: 22px; }
  .avatar.xl { width: 96px; height: 96px; font-size: 36px; }

  .user-menu-wrap { position: relative; }
  .user-menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--menu-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-width: 240px;
    padding: 8px 0;
    box-shadow: var(--shadow);
    z-index: 100;
  }
  .user-menu-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .user-menu-name { font-weight: 500; font-size: 14px; }
  .user-menu-handle { font-size: 13px; color: var(--text-muted); }
  .user-menu-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; gap: 12px;
    color: var(--text);
  }
  .user-menu-item:hover { background: var(--menu-hover); }
  .user-menu-item svg { width: 18px; height: 18px; fill: var(--text); opacity: 0.8; }
  .user-menu-item.danger { color: var(--accent); }
  .user-menu-item.danger svg { fill: var(--accent); opacity: 1; }

  /* ===========  БОКОВАЯ ПАНЕЛЬ  =========== */
  .sidebar {
    position: sticky; top: 56px;
    align-self: flex-start;
    width: 240px;
    flex-shrink: 0;
    height: calc(100vh - 56px);
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 12px 0;
    overflow-y: auto;
    z-index: 40;
    transition: width 0.2s, transform 0.2s;
  }
  .sidebar.closed { width: 0; transform: translateX(-100%); border-right: 0; padding: 0; overflow: hidden; }
  .sidebar-item {
    display: flex; align-items: center; gap: 20px;
    padding: 0 24px;
    height: 40px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: background 0.15s;
    white-space: nowrap;
  }
  .sidebar-item:hover { background: var(--bg-3); }
  .sidebar-item.active { background: var(--bg-3); font-weight: 500; }
  .sidebar-item svg { width: 22px; height: 22px; fill: var(--text); flex-shrink: 0; }
  .sidebar-divider {
    margin: 8px 12px;
    border-top: 1px solid var(--border);
  }
  .sidebar-title {
    padding: 8px 24px;
    font-size: 13px; font-weight: 500;
    color: var(--text-muted);
  }

  /* ===========  ОБЩЕЕ  =========== */
  .main-content {
    flex: 1;
    min-width: 0;
    min-height: calc(100vh - 56px);
    transition: margin-left 0.2s;
  }

  .container {
    max-width: 1500px;
    margin: 0 auto;
    padding: 24px;
  }
  .page-title {
    font-size: 22px; font-weight: 500;
    margin-bottom: 20px;
  }

  .btn-primary {
    height: 40px;
    padding: 0 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
  }
  .btn-primary:hover { background: #d9002b; }
  .btn-primary:disabled { background: var(--bg-3); color: var(--text-dim); cursor: not-allowed; }

  .btn-ghost {
    height: 36px;
    padding: 0 16px;
    background: var(--bg-3);
    color: var(--text);
    border: none;
    border-radius: 18px;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
  }
  .btn-ghost:hover { background: var(--bg-hover); }

  /* ===========  СЕТКА ВИДЕО  =========== */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 24px 14px;
  }
  .video-card {
    cursor: pointer;
    transition: transform 0.15s;
  }
  .video-card:hover { transform: translateY(-2px); }
  .video-card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg-3) center/cover no-repeat;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    transition: border-radius 0.2s;
  }
  .video-card:hover .video-card-thumb { border-radius: 0; }
  .video-card-thumb.placeholder {
    display: flex; align-items: center; justify-content: center;
  }
  .video-card-thumb.placeholder svg { width: 48px; height: 48px; fill: var(--text-dim); }

  .video-card-duration {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .video-card-menu {
    position: absolute; top: 6px; right: 6px;
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.7);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
    cursor: pointer; border: none; color: white;
  }
  .video-card:hover .video-card-menu { opacity: 1; }
  .video-card-menu svg { fill: white; }

  .video-card-info {
    display: flex; gap: 10px;
    padding: 10px 2px 0;
  }
  .video-card-info .avatar { flex-shrink: 0; }
  .video-card-text { flex: 1; min-width: 0; }
  .video-card-title {
    font-size: 13.5px; font-weight: 500;
    line-height: 1.35;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    margin-bottom: 3px;
    color: var(--text);
  }
  .video-card-meta {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .video-card-channel { cursor: pointer; }
  .video-card-channel:hover { color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-state h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; font-weight: 500; }
  .empty-state p { font-size: 14px; }

  /* ===========  СТРАНИЦА ПРОСМОТРА  =========== */
  .watch-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    gap: 24px;
    max-width: 1500px;
    margin: 0 auto;
    padding: 16px 24px 60px;
  }
  .watch-primary { min-width: 0; }
  .watch-sidebar { min-width: 0; padding-left: 8px; }
  .watch-sidebar h3 {
    font-size: 15px; font-weight: 500;
    margin-bottom: 10px;
  }

  .watch-title {
    font-size: 20px;
    font-weight: 500;
    margin: 16px 0 12px;
  }
  .watch-meta-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .watch-author {
    display: flex; align-items: center; gap: 12px;
  }
  .watch-author-info { display: flex; flex-direction: column; }
  .watch-author-name { font-weight: 500; font-size: 14px; }
  .watch-author-meta { font-size: 13px; color: var(--text-muted); }

  .watch-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btn {
    height: 36px;
    padding: 0 14px;
    background: var(--bg-3);
    color: var(--text);
    border: none;
    border-radius: 18px;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .action-btn:hover { background: var(--bg-hover); }
  .action-btn.active { background: rgba(62, 166, 255, 0.2); color: var(--accent-blue); }
  .action-btn svg { width: 20px; height: 20px; fill: currentColor; }

  .subscribe-btn {
    height: 36px;
    padding: 0 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 18px;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .subscribe-btn.subscribed {
    background: var(--bg-3);
    color: var(--text);
  }
  .subscribe-btn:hover { opacity: 0.9; }

  .watch-description {
    background: var(--bg-2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.5;
    cursor: pointer;
  }
  .watch-description-meta {
    font-weight: 500;
    margin-bottom: 8px;
  }
  .watch-description-text {
    color: var(--text);
    white-space: pre-wrap;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .watch-description.expanded .watch-description-text {
    -webkit-line-clamp: unset;
  }
  .watch-description-toggle {
    margin-top: 8px;
    font-weight: 500;
    color: var(--text);
    font-size: 13px;
  }

  .watch-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin: 12px 0 4px;
  }
  .watch-tag {
    background: var(--bg-3);
    padding: 4px 10px;
    border-radius: 16px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s;
  }
  .watch-tag:hover { background: var(--bg-hover); color: var(--text); }

  /* === Боковой список рекомендаций === */
  .reco-item {
    display: flex; gap: 8px;
    padding: 4px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 6px;
  }
  .reco-item:hover { background: var(--bg-3); }
  .reco-item.active {
    background: rgba(255, 0, 51, 0.10);
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .reco-item.active .reco-item-title { color: var(--accent); }
  .reco-item-thumb {
    width: 140px; aspect-ratio: 16/9;
    background: var(--bg-3) center/cover no-repeat;
    border-radius: 8px; flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .reco-item-thumb.placeholder {
    display: flex; align-items: center; justify-content: center;
  }
  .reco-item-thumb.placeholder svg { width: 24px; height: 24px; fill: var(--text-dim); }
  .reco-item-duration {
    position: absolute; bottom: 4px; right: 4px;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
  }
  .reco-item-info { flex: 1; min-width: 0; }
  .reco-item-title {
    font-size: 13px; font-weight: 500; line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    color: var(--text);
  }
  .reco-item-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* === Очередь воспроизведения (плейлист + рекомендации) === */
  .queue-section { margin-bottom: 18px; }
  .queue-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px;
    background: var(--bg-2);
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .queue-header-title { font-size: 14px; font-weight: 500; }
  .queue-header-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .queue-header-link {
    font-size: 12px; color: var(--accent-blue);
    cursor: pointer;
  }
  .queue-header-link:hover { text-decoration: underline; }
  .queue-divider {
    display: flex; align-items: center; gap: 10px;
    color: var(--text-muted);
    font-size: 12px;
    margin: 14px 0 8px;
    padding: 0 4px;
  }
  .queue-divider::before, .queue-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* === Комментарии === */
  .comments-section { margin-top: 32px; }
  .comments-header {
    font-size: 18px; font-weight: 500;
    margin-bottom: 20px;
  }
  .comment-form {
    display: flex; gap: 12px;
    margin-bottom: 24px;
  }
  .comment-form-content { flex: 1; }
  .comment-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 6px 0;
    color: var(--text);
    outline: none;
    font-size: 14px;
    resize: none;
    min-height: 36px;
  }
  .comment-input:focus { border-bottom-color: var(--text); }
  .comment-form-actions {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-top: 8px;
  }
  .comment {
    display: flex; gap: 12px;
    margin-bottom: 16px;
  }
  .comment-content { flex: 1; min-width: 0; }
  .comment-header {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 4px;
  }
  .comment-author { font-size: 13px; font-weight: 500; }
  .comment-time { font-size: 12px; color: var(--text-muted); }
  .comment-text {
    font-size: 14px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .comment-delete {
    background: none; border: none; color: var(--text-muted);
    font-size: 12px; cursor: pointer;
    padding: 4px 0;
    margin-top: 4px;
  }
  .comment-delete:hover { color: var(--accent); }

  /* ===========  СТРАНИЦА ЗАГРУЗКИ  =========== */
  .upload-page {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px;
  }
  .upload-drop {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 60px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-drop:hover, .upload-drop.dragging {
    border-color: var(--accent);
    background: rgba(255, 0, 51, 0.05);
  }
  .upload-drop-icon {
    width: 80px; height: 80px;
    background: var(--bg-3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .upload-drop-icon svg { width: 36px; height: 36px; fill: var(--text); }
  .upload-drop h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .upload-drop p { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }

  .upload-form { display: flex; gap: 24px; }
  .upload-form-fields { flex: 1; }
  .upload-form-preview { width: 280px; flex-shrink: 0; }
  .upload-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000 center/cover no-repeat;
    border-radius: 8px;
    overflow: hidden;
  }
  .upload-thumb-info {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .field { margin-bottom: 20px; }
  .field-label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field-input, .field-textarea {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    outline: none;
    font-size: 14px;
  }
  .field-input:focus, .field-textarea:focus { border-color: var(--accent-blue); }
  .field-textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
  .field-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .upload-actions {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-top: 24px;
  }

  .progress-bar {
    height: 4px;
    background: var(--bg-3);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.2s;
  }

  /* ===========  ПРОФИЛЬ  =========== */
  .profile-header {
    display: flex; gap: 24px; align-items: center;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .profile-info { flex: 1; min-width: 0; }
  .profile-info h1 { font-size: 28px; font-weight: 500; margin-bottom: 6px; }
  .profile-info p { color: var(--text-muted); font-size: 14px; }
  .profile-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .profile-actions .upload-btn { background: var(--accent); color: white; }
  .profile-actions .upload-btn:hover { background: #e0002e; }
  .profile-actions .upload-btn svg { fill: white; }
  [data-theme="light"] .profile-actions .upload-btn svg { fill: white; }

  /* ===========  LOGIN  =========== */
  .login-page {
    min-height: calc(100vh - 56px);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .login-card {
    background: var(--bg-2);
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
  }
  .login-card h1 { font-size: 24px; font-weight: 500; margin-bottom: 24px; text-align: center; }
  .login-tabs {
    display: flex; gap: 4px;
    background: var(--bg-3);
    padding: 4px;
    border-radius: 8px;
    margin-bottom: 24px;
  }
  .login-tab {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px; font-weight: 500;
  }
  .login-tab.active {
    background: var(--bg-2);
    color: var(--text);
  }
  .login-error {
    background: rgba(255, 0, 51, 0.15);
    border: 1px solid rgba(255, 0, 51, 0.3);
    color: #ff8899;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 16px;
  }
  [data-theme="light"] .login-error { color: #c00020; }
  .login-submit {
    width: 100%;
    height: 42px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
  }
  .login-submit:hover { background: #d9002b; }
  .login-submit:disabled { background: var(--bg-3); color: var(--text-dim); cursor: not-allowed; }

  /* ===========  PLAYER  =========== */
  .vp {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    user-select: none;
    color: white;
    --vp-accent: var(--accent);
  }
  .vp.fullscreen, .vp:fullscreen { border-radius: 0; width: 100vw; height: 100vh; }

  .vp-video {
    width: 100%; height: 100%; display: block; background: #000;
  }
  .vp-video::cue {
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 1.1em;
    line-height: 1.4;
  }

  /* === Верхняя панель === */
  .vp-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 14px 20px 32px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
    z-index: 3;
    transition: opacity 0.25s;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    pointer-events: none;
  }
  .vp-top-text { flex: 1; min-width: 0; }
  .vp-title {
    font-size: 16px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    color: #fff;
  }
  .vp-chapter {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* === Центральная кнопка === */
  .vp-center-play {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    background: rgba(0,0,0,0.65);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 3;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s, opacity 0.2s;
  }
  .vp-center-play:hover {
    background: var(--vp-accent);
    transform: translate(-50%, -50%) scale(1.05);
  }
  .vp-center-play svg { width: 36px; height: 36px; fill: white; margin-left: 4px; }
  .vp.playing .vp-center-play { opacity: 0; pointer-events: none; }

  /* === Спиннер === */
  .vp-spinner {
    position: absolute; top: 50%; left: 50%;
    width: 48px; height: 48px;
    margin: -24px 0 0 -24px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: vp-spin 0.8s linear infinite;
    z-index: 3;
  }
  @keyframes vp-spin { to { transform: rotate(360deg); } }

  /* === Перемотка двойным тапом === */
  .vp-seek-indicator {
    position: absolute; top: 50%;
    width: 80px; height: 80px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    pointer-events: none;
    opacity: 0;
    z-index: 3;
    font-size: 12px;
    color: white;
  }
  .vp-seek-indicator svg { width: 28px; height: 28px; fill: white; }
  .vp-seek-indicator.back { left: 15%; transform: translate(-50%, -50%); }
  .vp-seek-indicator.fwd { right: 15%; transform: translate(50%, -50%); }
  .vp-seek-indicator.show { animation: vp-seek-pulse 0.5s ease-out; }
  @keyframes vp-seek-pulse {
    0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
  }

  /* === Нижняя панель === */
  .vp-controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 32px 12px 6px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    z-index: 3;
    transition: opacity 0.25s;
  }
  .vp.hidden-ui .vp-controls,
  .vp.hidden-ui .vp-top { opacity: 0; }
  .vp.hidden-ui { cursor: none; }

  /* === Прогресс === */
  .vp-progress {
    position: relative;
    padding: 10px 4px;
    cursor: pointer;
  }
  .vp-progress-track {
    position: relative;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    transition: height 0.15s;
  }
  .vp-progress:hover .vp-progress-track,
  .vp-progress.dragging .vp-progress-track { height: 6px; }

  .vp-buffered, .vp-played {
    position: absolute; top: 0; left: 0;
    height: 100%;
    border-radius: 2px;
  }
  .vp-buffered { background: rgba(255,255,255,0.4); }
  .vp-played { background: var(--vp-accent); width: 0; }

  .vp-thumb {
    position: absolute; top: 50%;
    width: 14px; height: 14px;
    background: var(--vp-accent);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    transition: transform 0.15s;
    pointer-events: none;
  }
  .vp-progress:hover .vp-thumb,
  .vp-progress.dragging .vp-thumb { transform: translate(-50%, -50%) scale(1); }

  /* === Маркеры чаптеров === */
  .vp-chapter-marker {
    position: absolute; top: 0;
    width: 2px; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1;
    pointer-events: none;
  }

  /* === Превью времени === */
  .vp-tip {
    position: absolute;
    bottom: 100%;
    background: rgba(0,0,0,0.9);
    border-radius: 4px;
    padding: 6px 10px;
    transform: translateX(-50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    margin-bottom: 10px;
    white-space: nowrap;
    text-align: center;
    color: #fff;
  }
  .vp-progress:hover .vp-tip { opacity: 1; }
  .vp-tip-time {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .vp-tip-chapter {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 2px;
  }

  /* === Кнопки === */
  .vp-buttons {
    display: flex; align-items: center; gap: 2px;
  }
  .vp-btn {
    background: none; border: none; color: white;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
    flex-shrink: 0;
    position: relative;
  }
  .vp-btn:hover { background: rgba(255,255,255,0.15); }
  .vp-btn svg { width: 22px; height: 22px; fill: white; }
  .vp-btn.disabled { opacity: 0.4; cursor: not-allowed; }
  .vp-btn-dot {
    position: absolute; top: 6px; right: 6px;
    width: 6px; height: 6px;
    background: var(--vp-accent);
    border-radius: 50%;
  }
  .vp-spacer { flex: 1; }
  .vp-time {
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    padding: 0 10px;
    white-space: nowrap;
    color: #fff;
  }
  .vp-time .total { color: rgba(255,255,255,0.7); }

  /* === Громкость === */
  .vp-volume { display: flex; align-items: center; position: relative; }
  .vp-volume-slider {
    width: 0; overflow: hidden;
    transition: width 0.25s ease;
    display: flex; align-items: center;
  }
  .vp-volume:hover .vp-volume-slider { width: 80px; padding: 0 8px 0 4px; }
  .vp-volume-slider input {
    width: 100%;
    -webkit-appearance: none; appearance: none;
    height: 4px;
    background: linear-gradient(to right, white var(--vol, 70%), rgba(255,255,255,0.3) var(--vol, 70%));
    border-radius: 2px; cursor: pointer; outline: none;
  }
  .vp-volume-slider input::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    background: white; border-radius: 50%; cursor: pointer;
  }
  .vp-volume-slider input::-moz-range-thumb {
    width: 12px; height: 12px; background: white;
    border-radius: 50%; cursor: pointer; border: none;
  }

  /* === Меню настроек === */
  .vp-menu {
    position: absolute;
    bottom: 56px; right: 12px;
    background: rgba(28, 28, 28, 0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 8px;
    min-width: 240px;
    padding: 6px 0;
    z-index: 4;
    font-size: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    color: #fff;
  }
  .vp-menu-item {
    padding: 10px 16px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; cursor: pointer;
    transition: background 0.15s;
  }
  .vp-menu-item:hover { background: rgba(255,255,255,0.1); }
  .vp-menu-item .val {
    color: rgba(255,255,255,0.7);
    display: flex; align-items: center; gap: 6px;
  }
  .vp-menu-item .arrow { color: rgba(255,255,255,0.6); font-size: 12px; }
  .vp-menu-item .check {
    width: 14px;
    color: var(--vp-accent);
    visibility: hidden;
  }
  .vp-menu-item.active .check { visibility: visible; }
  .vp-menu-header {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    font-weight: 500;
  }
  .vp-menu-back { font-size: 18px; line-height: 1; }

  /* === Адаптив плеера === */
  @media (hover: none) and (pointer: coarse) {
    /* На сенсорных устройствах громкость всегда видна (нет hover) */
    .vp-volume-slider { width: 70px; padding: 0 6px; }
  }
  @media (max-width: 900px) {
    .vp-top { padding: 10px 14px 28px; }
    .vp-title { font-size: 14px; }
    .vp-chapter { font-size: 12px; }
    .vp-controls { padding: 28px 8px 4px; }
    .vp-btn { width: 38px; height: 38px; }
    .vp-menu { right: 8px; min-width: 220px; }
  }
  @media (max-width: 600px) {
    .vp-btn.hide-mobile { display: none; }
    .vp-btn { width: 34px; height: 34px; }
    .vp-btn svg { width: 20px; height: 20px; }
    .vp-time { padding: 0 6px; font-size: 12px; }
    .vp-top { padding: 8px 12px 24px; }
    .vp-controls { padding: 24px 4px 2px; }
    .vp-center-play { width: 64px; height: 64px; }
    .vp-center-play svg { width: 28px; height: 28px; }
    .vp-volume-slider { width: 56px; }
    .vp-volume:hover .vp-volume-slider { width: 56px; padding: 0 4px; }
    .vp-menu { left: 8px; right: 8px; bottom: 52px; min-width: 0; }
    .vp-seek-indicator { width: 64px; height: 64px; font-size: 11px; }
    .vp-seek-indicator svg { width: 22px; height: 22px; }
    .vp-tip { font-size: 11px; padding: 4px 8px; }
  }
  @media (max-width: 380px) {
    .vp-btn { width: 30px; height: 30px; }
    .vp-btn svg { width: 18px; height: 18px; }
    .vp-volume-slider { display: none; }
    .vp-time { font-size: 11px; padding: 0 4px; }
    .vp-time .total { display: none; }
  }

  /* === Storage note === */
  .storage-note {
    background: rgba(255, 0, 51, 0.08);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  [data-theme="light"] .storage-note { background: rgba(255, 0, 51, 0.06); }

  /* ===========  МОДАЛЬНЫЕ ОКНА  =========== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
    padding: 20px;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg-2);
    border-radius: 12px;
    padding: 24px;
    max-width: 500px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
    animation: slideUp 0.2s ease;
    position: relative;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal h2 { font-size: 20px; margin-bottom: 16px; }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none;
    color: var(--text);
    cursor: pointer;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--bg-3); }
  .modal-close svg { width: 20px; height: 20px; fill: var(--text); }

  /* ===========  TOAST  =========== */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-3);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 300;
    box-shadow: var(--shadow);
    animation: toast-in 0.3s ease;
    max-width: 90%;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ===========  ТЕМА (toggle в шапке) — нет лишнего floating btn  =========== */

  /* ===========  DONATE  =========== */
  .donate-btn {
    height: 36px;
    padding: 0 14px;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000;
    border: none;
    border-radius: 18px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .donate-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(255, 165, 0, 0.3);
  }
  .donate-amount-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 12px;
  }
  .donate-amount-btn {
    padding: 14px 8px;
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 16px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .donate-amount-btn:hover {
    background: var(--bg-hover);
    border-color: #FFA500;
    color: #FFA500;
  }
  .info-box {
    margin-top: 16px;
    padding: 12px;
    background: var(--bg-3);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ===========  КОЛЛАБОРАТИВНЫЕ ПЛЕЙЛИСТЫ  =========== */
  .playlist-panel {
    background: var(--bg-2);
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
  }
  .playlist-panel h3 {
    font-size: 16px; font-weight: 500;
    margin-bottom: 12px;
  }
  .collaborators-list {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin: 12px 0;
    min-height: 8px;
  }
  .collaborator-chip {
    background: var(--bg-3);
    padding: 4px 8px 4px 12px;
    border-radius: 16px;
    font-size: 13px;
    display: flex; align-items: center; gap: 6px;
    color: var(--text);
  }
  .collaborator-chip button {
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    padding: 0;
  }
  .collaborator-chip button:hover {
    background: rgba(255,255,255,0.1);
    color: var(--accent);
  }
  .invite-code-box {
    margin-top: 12px;
    padding: 12px 16px;
    background: var(--bg-3);
    border-radius: 8px;
    text-align: center;
  }
  .invite-code-box .label { font-size: 13px; color: var(--text-muted); }
  .invite-code-box .code {
    font-size: 22px; font-weight: 700;
    letter-spacing: 3px;
    font-family: 'SF Mono', Menlo, monospace;
    margin-top: 6px;
    color: var(--accent-blue);
    user-select: all;
  }

  /* ===========  AI BADGE  =========== */
  .ai-badge {
    display: inline-block;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ===========  ИМПОРТ/ЭКСПОРТ  =========== */
  .data-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    color: var(--text);
    width: 100%;
    text-align: left;
  }
  .data-row:hover {
    background: var(--bg-hover);
    border-color: var(--accent-blue);
  }
  .data-row svg { width: 24px; height: 24px; fill: var(--text); flex-shrink: 0; }
  .data-row-title { font-weight: 500; font-size: 14px; }
  .data-row-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ===========  PLAYLIST CARDS  =========== */
  .playlist-card {
    background: var(--bg-3);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    min-width: 200px;
    transition: background 0.15s;
  }
  .playlist-card:hover { background: var(--bg-hover); }

  /* Адаптив */
  @media (max-width: 1180px) {
    .watch-layout { grid-template-columns: 1fr; }
    .watch-sidebar { max-width: 800px; padding-left: 0; }
    .reco-item-thumb { width: 168px; }
  }
  @media (max-width: 1024px) {
    .sidebar {
      position: fixed; left: 0; top: 56px; bottom: 0;
      width: 240px; height: auto;
      box-shadow: var(--shadow);
    }
    .sidebar.closed { transform: translateX(-100%); width: 240px; padding: 12px 0; border-right: 1px solid var(--border); overflow-y: auto; }
    .main-content { margin-left: 0 !important; }
  }
  @media (max-width: 900px) {
    .profile-info h1 { font-size: 22px; }
    .profile-header { gap: 16px; padding: 16px 0; }
    .video-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  }
  @media (max-width: 720px) {
    .search-wrap { max-width: none; }
    .header { padding: 0 10px; gap: 8px; }
    .upload-form { flex-direction: column; }
    .upload-form-preview { width: 100%; }
    .video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 18px 10px; }
    .container { padding: 16px; }
    .watch-layout { padding: 12px; }
    .upload-btn span, .create-btn span { display: none; }
    .profile-header { flex-direction: column; align-items: flex-start; }
    .profile-actions { width: 100%; }
    .watch-title { font-size: 18px; }
    .watch-actions { gap: 6px; flex-wrap: wrap; }
    .action-btn { padding: 0 10px; height: 34px; font-size: 13px; }
    .modal { padding: 18px; }
    .modal h2 { font-size: 18px; }
    .reco-item-thumb { width: 120px; }
    .reco-item-title { font-size: 12px; }
  }
  @media (max-width: 480px) {

const DB_NAME = 'videohostDB';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('videos')) db.createObjectStore('videos');
      if (!db.objectStoreNames.contains('thumbs')) db.createObjectStore('thumbs');
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(store, key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function dbGet(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbDel(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

const LS = {
  get: (key, def) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
    catch { return def; }
  },
  set: (key, value) => localStorage.setItem(key, JSON.stringify(value)),
};

async function hashPassword(password) {
  const data = new TextEncoder().encode(password + 'salt_v1');
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

const COLORS = ['#FF5722', '#E91E63', '#9C27B0', '#3F51B5', '#2196F3', '#009688', '#4CAF50', '#FF9800'];
function hash32(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return h;
}
const colorFor = (id) => COLORS[Math.abs(hash32(String(id || ''))) % COLORS.length];

function formatDuration(seconds) {
  if (!isFinite(seconds) || seconds < 0) return '0:00';
  seconds = Math.floor(seconds);
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatViews(n) {
  if (!n) return '0 прсм.';
  if (n < 1000) return `${n} прсм.`;
  if (n < 1000000) return `${(n / 1000).toFixed(1).replace('.0','')} тыс. прсм.`;
  return `${(n / 1000000).toFixed(1).replace('.0','')} млн. прсм.`;
}

function formatNumber(n) {
  if (!n) return '0';
  if (n < 1000) return String(n);
  if (n < 1000000) return (n/1000).toFixed(1).replace('.0','') + ' тыс.';
  return (n/1000000).toFixed(1).replace('.0','') + ' млн.';
}

function formatTimeAgo(ts) {
  const sec = Math.floor((Date.now() - ts) / 1000);
  if (sec < 60) return 'только что';
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min} мин. назад`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr} ч. назад`;
  const d = Math.floor(hr / 24);
  if (d < 7) return `${d} дн. назад`;
  if (d < 30) return `${Math.floor(d/7)} нед. назад`;
  if (d < 365) return `${Math.floor(d/30)} мес. назад`;
  return `${Math.floor(d/365)} г. назад`;
}

async function generateThumbnail(file) {
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    video.preload = 'metadata';
    video.muted = true;
    video.playsInline = true;
    const url = URL.createObjectURL(file);
    video.src = url;
    let metaLoaded = false;
    const cleanup = () => URL.revokeObjectURL(url);

    video.onloadedmetadata = () => {
      metaLoaded = true;
      video.currentTime = Math.min(2, video.duration / 4);
    };
    video.onseeked = () => {
      try {
        const canvas = document.createElement('canvas');
        const maxW = 640;
        const scale = Math.min(1, maxW / video.videoWidth);
        canvas.width = video.videoWidth * scale;
        canvas.height = video.videoHeight * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => {
          cleanup();
          resolve({ thumb: blob, duration: video.duration, width: video.videoWidth, height: video.videoHeight });
        }, 'image/jpeg', 0.85);
      } catch (e) {
        cleanup();
        reject(e);
      }
    };
    video.onerror = () => { cleanup(); reject(new Error('Не удалось прочитать видео')); };
    setTimeout(() => { if (!metaLoaded) { cleanup(); reject(new Error('Таймаут чтения видео')); }}, 30000);
  });
}

const blobUrlCache = new Map();
async function getBlobUrl(store, key) {
  if (!key) return null;
  const cacheKey = `${store}:${key}`;
  if (blobUrlCache.has(cacheKey)) return blobUrlCache.get(cacheKey);
  const blob = await dbGet(store, key);
  if (!blob) return null;
  const url = URL.createObjectURL(blob);
  blobUrlCache.set(cacheKey, url);
  return url;
}

// Универсальное удаление видео: блобы + все связанные метаданные
async function deleteVideoById(videoId) {
  const video = STORE.videos().find(v => v.id === videoId);
  if (!video) return false;
  try {
    if (video.videoKey) await dbDel('videos', video.videoKey);
    if (video.thumbKey) await dbDel('thumbs', video.thumbKey);
  } catch {}
  STORE.setVideos(STORE.videos().filter(v => v.id !== videoId));
  STORE.setComments(STORE.comments().filter(c => c.videoId !== videoId));
  STORE.setLikes(STORE.likes().filter(l => l.videoId !== videoId));
  STORE.setPlaylistVideos(STORE.playlistVideos().filter(pv => pv.videoId !== videoId));
  STORE.setHistory(STORE.history().filter(h => h.videoId !== videoId));
  STORE.setWatchLater(STORE.watchLater().filter(w => w.videoId !== videoId));
  return true;
}

// Универсальный скоринг рекомендаций по сходству + персонализации
function scoreRecommendations(currentVideoId, user, excludeIds = new Set()) {
  const allVideos = STORE.videos();
  const current = allVideos.find(v => v.id === currentVideoId);
  if (!current) return [];

  const watched = user
    ? new Set(STORE.history().filter(h => h.userId === user.id).map(h => h.videoId))
    : new Set();
  const subs = user
    ? new Set(STORE.subscriptions().filter(s => s.userId === user.id).map(s => s.channelId))
    : new Set();
  const liked = user
    ? new Set(STORE.likes().filter(l => l.userId === user.id).map(l => l.videoId))
    : new Set();
  const likesByVideo = STORE.likes().reduce((acc, l) => {
    acc[l.videoId] = (acc[l.videoId] || 0) + 1;
    return acc;
  }, {});

  return allVideos
    .filter(v => v.id !== currentVideoId && !excludeIds.has(v.id))
    .map(v => {
      let score = 0;
      if (current.tags && v.tags) {
        const common = current.tags.filter(t => v.tags.includes(t));
        score += common.length * 12;
      }
      if (v.authorId === current.authorId) score += 6;
      if (subs.has(v.authorId)) score += 8;
      score += Math.log((v.views || 0) + 1) * 2.5;
      score += Math.log((likesByVideo[v.id] || 0) + 1) * 1.8;
      if (watched.has(v.id)) score -= 5;
      if (liked.has(v.id)) score += 1;
      const days = (Date.now() - v.createdAt) / 86400000;
      score -= Math.min(days * 0.05, 8);
      return { v, score };
    })
    .sort((a, b) => b.score - a.score)
    .map(x => x.v);
}

const isHlsSource = (url) => typeof url === 'string' && /\.m3u8(\?|$)/i.test(url);

function VideoPlayer({ src, poster, title, onNext, hasNext, subtitles = [], chapters = [], autoPlay = true }) {
  const playerRef = useRef(null);
  const videoRef = useRef(null);
  const hlsRef = useRef(null);
  const hideTimerRef = useRef(null);
  const clickTimerRef = useRef(null);
  const progressRef = useRef(null);

  // === Состояние воспроизведения ===
  const [playing, setPlaying] = useState(false);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration] = useState(0);
  const [buffered, setBuffered] = useState(0);
  const [volume, setVolume] = useState(() => {
    const saved = LS.get('vh_player_volume', 0.7);
    return typeof saved === 'number' && saved >= 0 && saved <= 1 ? saved : 0.7;
  });
  const [muted, setMuted] = useState(() => LS.get('vh_player_muted', false) === true);
  const [playbackRate, setPlaybackRate] = useState(1);
  const [loading, setLoading] = useState(false);

  // Применяем сохранённые настройки громкости к видео при монтировании
  useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    v.volume = volume;
    v.muted = muted;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Сохраняем громкость
  useEffect(() => { LS.set('vh_player_volume', volume); }, [volume]);
  useEffect(() => { LS.set('vh_player_muted', muted); }, [muted]);

  // === UI ===
  const [fullscreen, setFullscreen] = useState(false);
  const [hideUI, setHideUI] = useState(false);
  const [menu, setMenu] = useState(null); // null | 'main' | 'speed' | 'quality' | 'subtitles' | 'chapters'

  // === Качество HLS ===
  const [qualities, setQualities] = useState([]);
  const [currentLevel, setCurrentLevel] = useState(-1);

  // === Субтитры ===
  const [activeSub, setActiveSub] = useState(-1);

  // === Перетаскивание прогресса ===
  const [dragging, setDragging] = useState(false);
  const [hoverTime, setHoverTime] = useState(null);
  const [hoverX, setHoverX] = useState(0);

  // === Индикатор перемотки двойным кликом ===
  const [seekBack, setSeekBack] = useState(false);
  const [seekFwd, setSeekFwd] = useState(false);

  // ====================================================
  //  Инициализация HLS / обычного источника
  // ====================================================
  useEffect(() => {
    const video = videoRef.current;
    if (!video || !src) return;

    if (hlsRef.current) {
      hlsRef.current.destroy();
      hlsRef.current = null;
    }
    setQualities([]);
    setCurrentLevel(-1);

    if (isHlsSource(src)) {
      if (window.Hls && window.Hls.isSupported()) {
        const hls = new window.Hls({ enableWorker: true });
        hlsRef.current = hls;
        hls.loadSource(src);
        hls.attachMedia(video);

        hls.on(window.Hls.Events.MANIFEST_PARSED, (_, data) => {
          const levels = data.levels.map((l, i) => ({
            level: i,
            height: l.height || 0,
            bitrate: l.bitrate
          })).sort((a, b) => b.height - a.height);
          setQualities(levels);
        });

        hls.on(window.Hls.Events.ERROR, (_, data) => {
          if (data.fatal) {
            switch (data.type) {
              case window.Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
              case window.Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
              default: hls.destroy();
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = src;
      }
    } else {
      video.src = src;
    }

    return () => {
      if (hlsRef.current) {
        hlsRef.current.destroy();
        hlsRef.current = null;
      }
    };
  }, [src]);

  // ====================================================
  //  Переключение уровня качества HLS
  // ====================================================
  useEffect(() => {
    if (hlsRef.current) {
      hlsRef.current.currentLevel = currentLevel;
    }
  }, [currentLevel]);

  // ====================================================
  //  Автопроигрывание при смене источника
  // ====================================================
  useEffect(() => {
    if (!autoPlay || !src) return;
    const video = videoRef.current;
    if (!video) return;
    let cancelled = false;

    const tryPlay = async () => {
      if (cancelled) return;
      try {
        await video.play();
      } catch {
        // Браузер запретил автозапуск со звуком — пробуем без звука
        if (cancelled) return;
        try {
          video.muted = true;
          await video.play();
        } catch {}
      }
    };

    // Ждём, пока хоть немного метаданных подгрузится
    if (video.readyState >= 2) {
      tryPlay();
    } else {
      const onReady = () => { tryPlay(); video.removeEventListener('loadeddata', onReady); };
      video.addEventListener('loadeddata', onReady);
      return () => {
        cancelled = true;
        video.removeEventListener('loadeddata', onReady);
      };
    }
    return () => { cancelled = true; };
  }, [src, autoPlay]);

  // ====================================================
  //  Управление субтитрами
  // ====================================================
  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    Array.from(video.textTracks).forEach((track, i) => {
      track.mode = i === activeSub ? 'showing' : 'hidden';
    });
  }, [activeSub, subtitles, src]);

  // Сброс состояния при смене видео
  useEffect(() => {
    setActiveSub(-1);
    setMenu(null);
    setCurrentTime(0);
    setBuffered(0);
  }, [src]);

  // ====================================================
  //  События видео
  // ====================================================
  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;

    const onPlay = () => setPlaying(true);
    const onPause = () => setPlaying(false);
    const onTimeUpdate = () => { if (!dragging) setCurrentTime(video.currentTime); };
    const onDuration = () => setDuration(video.duration);
    const onWaiting = () => setLoading(true);
    const onCanPlay = () => setLoading(false);
    const onPlaying = () => setLoading(false);
    const onVolume = () => {
      setVolume(video.volume);
      setMuted(video.muted);
    };
    const onProgress = () => {
      if (video.buffered.length && video.duration) {
        setBuffered(video.buffered.end(video.buffered.length - 1) / video.duration);
      }
    };
    const onEndedEvt = () => {
      if (hasNext && onNext) onNext();
    };
    const onRateChange = () => setPlaybackRate(video.playbackRate);

    video.addEventListener('play', onPlay);
    video.addEventListener('pause', onPause);
    video.addEventListener('timeupdate', onTimeUpdate);
    video.addEventListener('loadedmetadata', onDuration);
    video.addEventListener('durationchange', onDuration);
    video.addEventListener('waiting', onWaiting);
    video.addEventListener('canplay', onCanPlay);
    video.addEventListener('playing', onPlaying);
    video.addEventListener('volumechange', onVolume);
    video.addEventListener('progress', onProgress);
    video.addEventListener('ended', onEndedEvt);
    video.addEventListener('ratechange', onRateChange);

    return () => {
      video.removeEventListener('play', onPlay);
      video.removeEventListener('pause', onPause);
      video.removeEventListener('timeupdate', onTimeUpdate);
      video.removeEventListener('loadedmetadata', onDuration);
      video.removeEventListener('durationchange', onDuration);
      video.removeEventListener('waiting', onWaiting);
      video.removeEventListener('canplay', onCanPlay);
      video.removeEventListener('playing', onPlaying);
      video.removeEventListener('volumechange', onVolume);
      video.removeEventListener('progress', onProgress);
      video.removeEventListener('ended', onEndedEvt);
      video.removeEventListener('ratechange', onRateChange);
    };
  }, [dragging, hasNext, onNext]);

  // ====================================================
  //  Полный экран
  // ====================================================
  useEffect(() => {
    const onFsChange = () => {
      const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      setFullscreen(isFs);
    };
    document.addEventListener('fullscreenchange', onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);
    return () => {
      document.removeEventListener('fullscreenchange', onFsChange);
      document.removeEventListener('webkitfullscreenchange', onFsChange);
    };
  }, []);

  const toggleFullscreen = useCallback(() => {
    const el = playerRef.current;
    if (!el) return;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
    }
  }, []);

  // ====================================================
  //  Управление воспроизведением
  // ====================================================
  const togglePlay = useCallback(() => {
    const video = videoRef.current;
    if (!video) return;
    if (video.paused) video.play().catch(() => {});
    else video.pause();
  }, []);

  const seek = useCallback((time) => {
    const video = videoRef.current;
    if (!video || !isFinite(time)) return;
    video.currentTime = Math.max(0, Math.min(video.duration || 0, time));
  }, []);

  const skip = useCallback((delta) => {
    const video = videoRef.current;
    if (!video) return;
    seek(video.currentTime + delta);
    if (delta < 0) {
      setSeekBack(false); setTimeout(() => setSeekBack(true), 0);
      setTimeout(() => setSeekBack(false), 500);
    } else {
      setSeekFwd(false); setTimeout(() => setSeekFwd(true), 0);
      setTimeout(() => setSeekFwd(false), 500);
    }
  }, [seek]);

  // ====================================================
  //  Автоскрытие UI
  // ====================================================
  const showUI = useCallback(() => {
    setHideUI(false);
    clearTimeout(hideTimerRef.current);
    if (playing && !menu) {
      hideTimerRef.current = setTimeout(() => setHideUI(true), 3000);
    }
  }, [playing, menu]);

  useEffect(() => { showUI(); }, [showUI]);

  // ====================================================
  //  Горячие клавиши
  // ====================================================
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const key = e.key.toLowerCase();
      const video = videoRef.current;
      if (!video) return;

      if (/^[0-9]$/.test(e.key) && video.duration) {
        e.preventDefault();
        seek(video.duration * (parseInt(e.key) / 10));
        return;
      }

      switch (key) {
        case ' ': case 'k': e.preventDefault(); togglePlay(); break;
        case 'arrowleft': e.preventDefault(); skip(-5); break;
        case 'arrowright': e.preventDefault(); skip(5); break;
        case 'j': e.preventDefault(); skip(-10); break;
        case 'l': e.preventDefault(); skip(10); break;
        case 'arrowup': e.preventDefault(); video.volume = Math.min(1, video.volume + 0.05); video.muted = false; break;
        case 'arrowdown': e.preventDefault(); video.volume = Math.max(0, video.volume - 0.05); break;
        case 'm': e.preventDefault(); video.muted = !video.muted; break;
        case 'f': e.preventDefault(); toggleFullscreen(); break;
        case 'escape':
          if (menu) { e.preventDefault(); setMenu(null); }
          break;
        case 'c':
          if (subtitles.length > 0) { e.preventDefault(); setActiveSub(activeSub === -1 ? 0 : -1); }
          break;
        case 'n':
          if (hasNext && onNext) { e.preventDefault(); onNext(); }
          break;
        case 'home': e.preventDefault(); seek(0); break;
        case 'end': e.preventDefault(); seek(video.duration); break;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [togglePlay, toggleFullscreen, skip, seek, activeSub, subtitles.length, hasNext, onNext, menu]);

  // Клик вне меню — закрыть
  useEffect(() => {
    if (!menu) return;
    const onClick = (e) => {
      const menuEl = playerRef.current?.querySelector('.vp-menu');
      const settingsBtn = e.target.closest('[aria-label="Настройки"]');
      if (menuEl && !menuEl.contains(e.target) && !settingsBtn) {
        setMenu(null);
      }
    };
    // Откладываем на следующий тик, чтобы не закрыть только что открытое меню
    const id = setTimeout(() => document.addEventListener('click', onClick), 0);
    return () => {
      clearTimeout(id);
      document.removeEventListener('click', onClick);
    };
  }, [menu]);

  // ====================================================
  //  Перетаскивание прогресс-бара
  // ====================================================
  useEffect(() => {
    if (!dragging) return;
    const onMove = (e) => {
      const rect = progressRef.current?.getBoundingClientRect();
      if (!rect) return;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      const t = pct * (duration || 0);
      setCurrentTime(t);
      seek(t);
    };
    const onUp = () => setDragging(false);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('touchend', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
  }, [dragging, duration, seek]);

  // ====================================================
  //  Текущая глава
  // ====================================================
  const currentChapter = useMemo(() => {
    if (!chapters.length || !duration) return null;
    let curr = null;
    for (const c of chapters) {
      if (c.time <= currentTime) curr = c;
      else break;
    }
    return curr;
  }, [chapters, currentTime, duration]);

  // ====================================================
  //  Обработчики кликов на видео
  // ====================================================
  const onVideoClick = () => {
    clearTimeout(clickTimerRef.current);
    clickTimerRef.current = setTimeout(togglePlay, 220);
  };

  const onVideoDblClick = (e) => {
    clearTimeout(clickTimerRef.current);
    const rect = videoRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const third = rect.width / 3;
    if (x < third) skip(-10);
    else if (x > rect.width - third) skip(10);
    else toggleFullscreen();
  };

  // ====================================================
  //  Клик/наведение на прогресс
  // ====================================================
  const getPctFromEvent = (e) => {
    const rect = progressRef.current?.getBoundingClientRect();
    if (!rect) return 0;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  };

  const onProgressMouseDown = (e) => {
    setDragging(true);
    const pct = getPctFromEvent(e);
    seek(pct * (duration || 0));
  };

  const onProgressMove = (e) => {
    const rect = progressRef.current?.getBoundingClientRect();
    if (!rect) return;
    const pct = getPctFromEvent(e);
    setHoverTime(pct * (duration || 0));
    // Ограничиваем позицию подсказки, чтобы не вылетала за края
    const tipHalfWidth = 50;
    setHoverX(Math.max(tipHalfWidth, Math.min(rect.width - tipHalfWidth, pct * rect.width)));
  };

  // Скрыть подсказку, когда курсор уходит с прогресса
  const onProgressLeave = () => setHoverTime(null);

  const hoverChapter = useMemo(() => {
    if (!chapters.length || hoverTime == null) return null;
    let curr = null;
    for (const c of chapters) {
      if (c.time <= hoverTime) curr = c;
      else break;
    }
    return curr;
  }, [chapters, hoverTime]);

  // ====================================================
  //  Громкость
  // ====================================================
  const setVideoVolume = (v) => {
    const video = videoRef.current;
    if (!video) return;
    video.volume = v;
    video.muted = v === 0;
  };

  const VolumeIcon = muted || volume === 0 ? ICONS.volMute
    : volume < 0.5 ? ICONS.volLow : ICONS.volHigh;

  // ====================================================
  //  Picture-in-picture
  // ====================================================
  const togglePip = useCallback(async () => {
    const video = videoRef.current;
    if (!video) return;
    try {
      if (document.pictureInPictureElement) await document.exitPictureInPicture();
      else await video.requestPictureInPicture();
    } catch {}
  }, []);

  // ====================================================
  //  Меню
  // ====================================================
  const speedLabel = playbackRate === 1 ? 'Обычная' : playbackRate.toString().replace('.', ',');
  const qualityLabel = currentLevel === -1
    ? 'Авто'
    : (qualities.find(q => q.level === currentLevel)?.height + 'p') || 'Авто';
  const subLabel = activeSub === -1 ? 'Выкл.' : subtitles[activeSub]?.label || '—';

  return (
    <div
      ref={playerRef}
      className={`vp ${playing ? 'playing' : ''} ${hideUI ? 'hidden-ui' : ''} ${fullscreen ? 'fullscreen' : ''}`}
      onMouseMove={showUI}
      onMouseLeave={() => playing && !menu && setHideUI(true)}
      onTouchStart={showUI}
    >
      <video
        ref={videoRef}
        className="vp-video"
        poster={poster}
        playsInline
        preload="metadata"
        onClick={onVideoClick}
        onDoubleClick={onVideoDblClick}
        crossOrigin="anonymous"
      >
        {subtitles.map((sub, i) => (
          <track
            key={i}
            src={sub.src}
            kind="subtitles"
            srcLang={sub.lang}
            label={sub.label}
          />
        ))}
      </video>

      {/* Верхняя панель */}
      {(title || currentChapter) && (
        <div className="vp-top">
          <div className="vp-top-text">
            {title && <div className="vp-title">{title}</div>}
            {currentChapter && <div className="vp-chapter">{currentChapter.title}</div>}
          </div>
        </div>
      )}

      {/* Индикаторы перемотки */}
      <div className={`vp-seek-indicator back ${seekBack ? 'show' : ''}`}>
        <I d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z" />
        <span>−10 сек</span>
      </div>
      <div className={`vp-seek-indicator fwd ${seekFwd ? 'show' : ''}`}>
        <I d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" />
        <span>+10 сек</span>
      </div>

      {/* Спиннер */}
      {loading && <div className="vp-spinner" />}

      {/* Центральная кнопка play */}
      {!loading && (
        <button className="vp-center-play" onClick={togglePlay} aria-label="Воспроизвести">
          <I d={ICONS.play} />
        </button>
      )}

      {/* Нижняя панель */}
      <div className="vp-controls">
        {/* Прогресс */}
        <div
          ref={progressRef}
          className={`vp-progress ${dragging ? 'dragging' : ''}`}
          onMouseDown={onProgressMouseDown}
          onMouseMove={onProgressMove}
          onMouseLeave={onProgressLeave}
          onTouchStart={onProgressMouseDown}
        >
          {hoverTime != null && (
            <div className="vp-tip" style={{ left: hoverX }}>
              {hoverChapter && <div className="vp-tip-chapter">{hoverChapter.title}</div>}
              <div className="vp-tip-time">{formatDuration(hoverTime)}</div>
            </div>
          )}
          <div className="vp-progress-track">
            <div className="vp-buffered" style={{ width: `${buffered * 100}%` }} />
            <div className="vp-played" style={{ width: `${duration ? (currentTime / duration) * 100 : 0}%` }} />
            {chapters.map((c, i) => {
              if (c.time === 0 || !duration) return null;
              return (
                <div
                  key={i}
                  className="vp-chapter-marker"
                  style={{ left: `${(c.time / duration) * 100}%` }}
                />
              );
            })}
            <div className="vp-thumb" style={{ left: `${duration ? (currentTime / duration) * 100 : 0}%` }} />
          </div>
        </div>

        {/* Кнопки */}
        <div className="vp-buttons">
          <button className="vp-btn" onClick={togglePlay} aria-label="Воспроизвести/Пауза">
            <I d={playing ? ICONS.pause : ICONS.play} />
          </button>

          {hasNext && (
            <button className="vp-btn" onClick={onNext} aria-label="Следующее видео" title="Следующее видео">
              <I d={ICONS.next} />
            </button>
          )}

          <button className="vp-btn hide-mobile" onClick={() => skip(-10)} aria-label="−10 сек" title="−10 сек">
            <I d={ICONS.skipBack} />
          </button>
          <button className="vp-btn hide-mobile" onClick={() => skip(10)} aria-label="+10 сек" title="+10 сек">
            <I d={ICONS.skipFwd} />
          </button>

          <div className="vp-volume">
            <button className="vp-btn" onClick={() => setVideoVolume(muted ? 0.7 : 0)} aria-label="Громкость">
              <I d={VolumeIcon} />
            </button>
            <div className="vp-volume-slider">
              <input
                type="range" min="0" max="100"
                value={muted ? 0 : Math.round(volume * 100)}
                onChange={e => setVideoVolume(parseInt(e.target.value) / 100)}
                style={{ '--vol': `${muted ? 0 : volume * 100}%` }}
              />
            </div>
          </div>

          <div className="vp-time">
            <span>{formatDuration(currentTime)}</span>
            <span className="total"> / {formatDuration(duration)}</span>
          </div>

          <div className="vp-spacer" />

          {subtitles.length > 0 && (
            <button
              className="vp-btn"
              onClick={() => setActiveSub(activeSub === -1 ? 0 : -1)}
              aria-label="Субтитры"
              title="Субтитры (C)"
            >
              <I d={ICONS.cc} />
              {activeSub !== -1 && <span className="vp-btn-dot" />}
            </button>
          )}

          <button
            className="vp-btn"
            onClick={(e) => {
              e.stopPropagation();
              setMenu(menu ? null : 'main');
            }}
            aria-label="Настройки"
            title="Настройки"
          ><I d={ICONS.settings} /></button>

          <button className="vp-btn hide-mobile" onClick={togglePip} aria-label="Картинка в картинке" title="Картинка в картинке">
            <I d={ICONS.pip} />
          </button>

          <button className="vp-btn" onClick={toggleFullscreen} aria-label="Полный экран" title="Полный экран (F)">
            <I d={fullscreen ? ICONS.fsExit : ICONS.fsEnter} />
          </button>
        </div>

        {/* Меню */}
        {menu && (
          <div className="vp-menu" onClick={e => e.stopPropagation()}>
            {menu === 'main' && (
              <>
                <div className="vp-menu-item" onClick={() => setMenu('speed')}>
                  <span>Скорость</span>
                  <span className="val">{speedLabel}<span className="arrow">›</span></span>
                </div>
                {qualities.length > 0 && (
                  <div className="vp-menu-item" onClick={() => setMenu('quality')}>
                    <span>Качество</span>
                    <span className="val">{qualityLabel}<span className="arrow">›</span></span>
                  </div>
                )}
                {subtitles.length > 0 && (
                  <div className="vp-menu-item" onClick={() => setMenu('subtitles')}>
                    <span>Субтитры</span>
                    <span className="val">{subLabel}<span className="arrow">›</span></span>
                  </div>
                )}
                {chapters.length > 0 && (
                  <div className="vp-menu-item" onClick={() => setMenu('chapters')}>
                    <span>Главы</span>
                    <span className="val">{currentChapter?.title || '—'}<span className="arrow">›</span></span>
                  </div>
                )}
              </>
            )}

            {menu === 'speed' && (
              <>
                <div className="vp-menu-header" onClick={() => setMenu('main')}>
                  <span className="vp-menu-back">‹</span><span>Скорость</span>
                </div>
                {[0.25, 0.5, 0.75, 1, 1.25, 1.5, 2].map(s => (
                  <div
                    key={s}
                    className={`vp-menu-item ${playbackRate === s ? 'active' : ''}`}
                    onClick={() => {
                      if (videoRef.current) videoRef.current.playbackRate = s;
                      setMenu('main');
                    }}
                  >
                    <span><span className="check">✓</span> {s === 1 ? 'Обычная' : s.toString().replace('.', ',')}</span>
                  </div>
                ))}
              </>
            )}

            {menu === 'quality' && (
              <>
                <div className="vp-menu-header" onClick={() => setMenu('main')}>
                  <span className="vp-menu-back">‹</span><span>Качество</span>
                </div>
                <div
                  className={`vp-menu-item ${currentLevel === -1 ? 'active' : ''}`}
                  onClick={() => { setCurrentLevel(-1); setMenu('main'); }}
                >
                  <span><span className="check">✓</span> Авто</span>
                </div>
                {qualities.map(q => (
                  <div
                    key={q.level}
                    className={`vp-menu-item ${currentLevel === q.level ? 'active' : ''}`}
                    onClick={() => { setCurrentLevel(q.level); setMenu('main'); }}
                  >
                    <span><span className="check">✓</span> {q.height}p</span>
                    <span className="val">{Math.round(q.bitrate / 1000)} kbps</span>
                  </div>
                ))}
              </>
            )}

            {menu === 'subtitles' && (
              <>
                <div className="vp-menu-header" onClick={() => setMenu('main')}>
                  <span className="vp-menu-back">‹</span><span>Субтитры</span>
                </div>
                <div
                  className={`vp-menu-item ${activeSub === -1 ? 'active' : ''}`}
                  onClick={() => { setActiveSub(-1); setMenu('main'); }}
                >
                  <span><span className="check">✓</span> Выключены</span>
                </div>
                {subtitles.map((sub, i) => (
                  <div
                    key={i}
                    className={`vp-menu-item ${activeSub === i ? 'active' : ''}`}
                    onClick={() => { setActiveSub(i); setMenu('main'); }}
                  >
                    <span><span className="check">✓</span> {sub.label}</span>
                  </div>
                ))}
              </>
            )}

            {menu === 'chapters' && (
              <>
                <div className="vp-menu-header" onClick={() => setMenu('main')}>
                  <span className="vp-menu-back">‹</span><span>Главы</span>
                </div>
                {chapters.map((c, i) => (
                  <div
                    key={i}
                    className={`vp-menu-item ${currentChapter === c ? 'active' : ''}`}
                    onClick={() => { seek(c.time); setMenu(null); }}
                  >
                    <span><span className="check">✓</span> {c.title}</span>
                    <span className="val">{formatDuration(c.time)}</span>
                  </div>
                ))}
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


// ============================================================
//  НОВЫЕ ФИЧИ: МОДАЛ-ОБОЛОЧКА
// ============================================================
function Modal({ title, children, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose} title="Закрыть"><I d={ICONS.close} /></button>
        {title && <h2>{title}</h2>}
        {children}
      </div>
    </div>
  );
}
